<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Notificaciones Push</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #4285f4;
            margin: 10px 0;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }

        .section {
            background: white;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button {
            background: #4285f4;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
        }

        button:hover {
            background: #3367d6;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .history-table th {
            background: #f8f9fa;
            font-weight: 600;
        }

        .history-table tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .badge-success {
            background: #e8f5e9;
            color: #2d8e47;
        }

        .badge-warning {
            background: #fff3e0;
            color: #f57c00;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .success {
            background: #e8f5e9;
            color: #2d8e47;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Panel de Administración</h1>
            <p>Gestión de notificaciones push</p>
        </header>

        <!-- Estadísticas -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Suscripciones Activas</div>
                <div class="stat-value" id="activeSubscriptions">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Usuarios Únicos</div>
                <div class="stat-value" id="uniqueUsers">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Notificaciones Enviadas (30d)</div>
                <div class="stat-value" id="totalNotifications">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Tasa de Éxito</div>
                <div class="stat-value" id="successRate">-</div>
            </div>
        </div>

        <!-- Enviar Notificación -->
        <div class="section">
            <h2>📤 Enviar Notificación</h2>
            <div id="messageContainer"></div>
            
            <form id="sendNotificationForm">
                <div class="form-group">
                    <label for="title">Título *</label>
                    <input type="text" id="title" required placeholder="Título de la notificación">
                </div>

                <div class="form-group">
                    <label for="body">Mensaje *</label>
                    <textarea id="body" required placeholder="Contenido de la notificación"></textarea>
                </div>

                <div class="form-group">
                    <label for="url">URL de destino</label>
                    <input type="url" id="url" placeholder="https://ejemplo.com/pagina">
                </div>

                <div class="form-group">
                    <label for="recipient">Destinatarios *</label>
                    <select id="recipient" required>
                        <option value="all">Todos los usuarios</option>
                        <option value="user">Usuario específico</option>
                        <option value="topic">Topic específico</option>
                    </select>
                </div>

                <div class="form-group" id="userIdGroup" style="display: none;">
                    <label for="userId">ID de Usuario</label>
                    <input type="text" id="userId" placeholder="guest_abc123">
                </div>

                <div class="form-group" id="topicGroup" style="display: none;">
                    <label for="topic">Nombre del Topic</label>
                    <input type="text" id="topic" placeholder="news">
                </div>

                <button type="submit" id="submitBtn">Enviar Notificación</button>
            </form>
        </div>

        <!-- Historial -->
        <div class="section">
            <h2>📜 Historial de Notificaciones</h2>
            <div id="historyContainer">
                <div class="loading">Cargando historial...</div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';

        // Cargar estadísticas
        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('activeSubscriptions').textContent = 
                        data.data.subscriptions.activeSubscriptions;
                    document.getElementById('uniqueUsers').textContent = 
                        data.data.subscriptions.uniqueUsers;
                    document.getElementById('totalNotifications').textContent = 
                        data.data.notifications.totalNotifications;
                    document.getElementById('successRate').textContent = 
                        data.data.notifications.successRate + '%';
                }
            } catch (error) {
                console.error('Error al cargar estadísticas:', error);
            }
        }

        // Cargar historial
        async function loadHistory() {
            try {
                const response = await fetch(`${API_URL}/history?limit=20`);
                const data = await response.json();

                const container = document.getElementById('historyContainer');

                if (data.success && data.data.length > 0) {
                    const table = document.createElement('table');
                    table.className = 'history-table';
                    
                    table.innerHTML = `
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Título</th>
                                <th>Mensaje</th>
                                <th>Tipo</th>
                                <th>Enviadas</th>
                                <th>Éxito/Fallos</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.data.map(item => `
                                <tr>
                                    <td>${new Date(item.sent_at).toLocaleString('es-ES')}</td>
                                    <td>${item.title}</td>
                                    <td>${item.body.substring(0, 50)}${item.body.length > 50 ? '...' : ''}</td>
                                    <td><span class="badge badge-warning">${item.notification_type}</span></td>
                                    <td>${item.recipients_count}</td>
                                    <td>
                                        <span class="badge badge-success">${item.success_count}</span> / 
                                        ${item.failure_count}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    `;
                    
                    container.innerHTML = '';
                    container.appendChild(table);
                } else {
                    container.innerHTML = '<p>No hay historial disponible</p>';
                }
            } catch (error) {
                console.error('Error al cargar historial:', error);
                document.getElementById('historyContainer').innerHTML = 
                    '<p class="error">Error al cargar el historial</p>';
            }
        }

        // Mostrar/ocultar campos según destinatario
        document.getElementById('recipient').addEventListener('change', (e) => {
            const value = e.target.value;
            document.getElementById('userIdGroup').style.display = value === 'user' ? 'block' : 'none';
            document.getElementById('topicGroup').style.display = value === 'topic' ? 'block' : 'none';
        });

        // Enviar notificación
        document.getElementById('sendNotificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('title').value;
            const body = document.getElementById('body').value;
            const url = document.getElementById('url').value;
            const recipient = document.getElementById('recipient').value;
            const userId = document.getElementById('userId').value;
            const topic = document.getElementById('topic').value;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Enviando...';

            try {
                let endpoint = '';
                let payload = { title, body, url };

                switch (recipient) {
                    case 'all':
                        endpoint = '/send-to-all';
                        break;
                    case 'user':
                        endpoint = '/send-to-user';
                        payload.userId = userId;
                        break;
                    case 'topic':
                        endpoint = '/send-to-topic';
                        payload.topic = topic;
                        break;
                }

                const response = await fetch(`${API_URL}${endpoint}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                const messageContainer = document.getElementById('messageContainer');
                
                if (data.success) {
                    messageContainer.innerHTML = `
                        <div class="success">
                            ✅ ${data.message || 'Notificación enviada correctamente'}
                        </div>
                    `;
                    
                    // Limpiar formulario
                    e.target.reset();
                    
                    // Recargar estadísticas e historial
                    setTimeout(() => {
                        loadStats();
                        loadHistory();
                    }, 1000);
                } else {
                    messageContainer.innerHTML = `
                        <div class="error">
                            ❌ Error: ${data.error || 'No se pudo enviar la notificación'}
                        </div>
                    `;
                }

                // Ocultar mensaje después de 5 segundos
                setTimeout(() => {
                    messageContainer.innerHTML = '';
                }, 5000);

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('messageContainer').innerHTML = `
                    <div class="error">❌ Error de conexión con el servidor</div>
                `;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Notificación';
            }
        });

        // Cargar datos al iniciar
        loadStats();
        loadHistory();

        // Actualizar cada 30 segundos
        setInterval(() => {
            loadStats();
            loadHistory();
        }, 30000);
    </script>
</body>
</html>
